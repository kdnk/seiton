name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Rollup native package for runner
        shell: bash
        run: npm install --no-save --no-package-lock $(node -p "const { platform, arch } = process; platform === 'linux' ? '@rollup/rollup-linux-' + arch + '-gnu' : platform === 'darwin' ? '@rollup/rollup-darwin-' + arch : platform === 'win32' ? '@rollup/rollup-win32-' + arch + '-msvc' : (() => { throw new Error('Unsupported platform: ' + platform) })()")

      - name: Build and Publish
        run: npm run publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
